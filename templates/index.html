<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Watcher - 本地 Markdown 预览</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📘 MD Watcher</h1>
                <p class="base-dir" title="{{ base_dir }}">{{ base_dir }}</p>
                <button id="btn-collapse" class="btn-collapse" title="收起侧边栏">◀</button>
            </div>
            <div class="sidebar-toolbar">
                <button id="btn-open-folder" title="打开文件夹">📂</button>
                <button id="btn-refresh" title="刷新">🔄</button>
            </div>
            <nav id="tree" class="tree">
                <div class="empty">加载目录中…</div>
            </nav>
        </aside>
        <div id="context-menu" class="context-menu hidden"></div>
        <div id="toast" class="toast hidden"></div>
        <main class="main">
            <button id="btn-expand" class="btn-expand hidden" title="展开侧边栏">▶</button>
            <div id="toolbar" class="toolbar">
                <span id="current-file">未选择文件</span>
                <span id="status" class="status disconnected">未连接</span>
            </div>
            <article id="preview" class="preview">
                <div class="placeholder">请从左侧选择一个 Markdown 文件</div>
            </article>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
